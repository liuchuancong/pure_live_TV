name: pure_live
description: 纯粹直播,一款开源的第三方多平台直播聚合播放器.
publish_to: none
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  # Flutter SDK 基础内置
  flutter:
    sdk: flutter
  collection: ^1.19.1        # Dart集合工具扩展方法
  intl: ^0.20.2              # 国际化、日期数字格式化
  meta: ^1.18.0              # Dart元注解(Deprecated/required等)
  path: ^1.9.1               # 跨平台文件路径处理
  file: ^7.0.0               # 文件读写增强封装
  path_provider: ^2.1.5 # 获取文件路径
  
  # 网络请求、爬虫、Cookie、UA伪装
  dio: ^5.9.2                         # 主流HTTP客户端，项目核心请求库
  dio_cookie_manager: ^3.4.0          # Dio绑定cookieJar自动管理Cookie
  cookie_jar: ^4.0.8                  # Cookie持久化存储容器
  pretty_dio_logger: ^1.4.0           # Dio请求日志打印调试
  random_user_agents: ^1.0.25         # 随机生成浏览器UA，爬虫伪装反爬
  http: ^1.6.0                        # Dart原生基础HTTP备用库
  html_unescape: ^2.0.0              # HTML转义字符还原(&lt;等解码)
  charset_converter: ^2.3.0           # 网页编码转换(gbk/gbk2312等)

  # WebSocket、网络通信、流媒体协议
  web_socket_channel: ^3.0.1          # WebSocket长连接通信
  webdav_client: ^1.2.2               # WebDAV网盘文件同步
  connectivity_plus: ^7.1.1           # 网络状态检测(Wi-Fi/移动/无网)

  # 本地持久化数据库 & 缓存
  hive_ce: ^2.15.1                    # 高性能NoSQL本地键值数据库
  hive_ce_flutter: ^2.3.3             # Hive Flutter平台适配
  cached_network_image: ^3.4.1        # 网络图片本地缓存
  flutter_cache_manager: ^3.4.1       # 通用文件缓存管理

  # 状态管理 & 代码序列化注解
  flutter_riverpod: ^3.3.2            # Riverpod 状态管理
  riverpod_annotation: ^4.0.3          # Riverpod注解生成依赖
  freezed_annotation: ^3.1.0          # 数据模型冻结类注解
  json_annotation: ^4.12.0            # JSON序列化基础注解

  # 路由页面跳转
  go_router: ^17.3.0                  # Flutter官方推荐路由管理
  go_transitions: ^0.8.3              # go_router页面切换动画

  # UI布局、屏幕适配、图标色彩
  dpad: ^3.0.0                        # TV遥控器方向键导航适配
  flutter_screenutil_plus: ^1.5.0     # 屏幕尺寸适配、字体缩放
  hexcolor: ^3.1.3                    # 十六进制颜色字符串解析
  url_launcher: ^6.1.12               # 唤起外部浏览器、APP跳转

  # 下拉刷新、无限列表、加载动画
  easy_refresh: ^3.5.1                # 自定义下拉刷新、上拉加载组件
  infinite_scroll_pagination: ^5.1.1  # 分页无限滚动列表
  flutter_spinkit: ^5.2.2             # 多种内置加载动画
  loading_animation_widget: ^1.3.0     # 自定义加载动画封装
  loading_indicator: ^3.1.1            # 轻量加载指示器

  # 弹窗、提示、Markdown、二维码
  flutter_smart_dialog: ^5.1.0        # 全局弹窗、Toast、对话框
  flutter_markdown_plus: ^1.0.7       # Markdown文本渲染
  qr_flutter: ^4.1.0                  # 生成二维码图片

  # 视频播放、流媒体、弹幕
  media_kit: ^1.2.6                   # 跨平台音视频播放核心
  media_kit_video: ^2.0.1             # media-kit视频渲染层
  media_kit_libs_video: ^1.0.7        # media-kit原生底层解码库
  better_player_plus: ^1.3.4          # 备用播放器(hls/flv兼容)
  flame_barrage: ^0.0.3               # 直播间弹幕渲染

  # 文件选择、打开、权限
  open_filex: ^4.7.0                  # 调用第三方APP打开本地文件
  permission_handler: ^12.0.1         # 各平台权限申请管理

  # 设备、APP信息
  device_info_plus: ^13.1.0           # 获取设备型号系统版本
  package_info_plus: ^10.1.0          # 获取APP版本、包名

  # 编解码、加密、压缩、UUID
  crypto: ^3.0.7                      # MD5/SHA等加密哈希算法
  es_compression: ^2.0.15             # 数据流gzip/deflate压缩解压
  protobuf: ^6.0.0                    # Protobuf二进制序列化协议
  fixnum: ^1.1.1                      # Protobuf固定大小数值类型
  uuid: ^4.5.3                        # 生成唯一UUID标识

  # 日期时间、日志、计时器
  timezone: ^0.11.0                   # 多时区日期处理
  logger: ^2.7.0                      # 分级日志打印(INFO/WARN/ERROR)
  stop_watch_timer: ^3.2.2            # 高精度计时器、秒表

  # 动画效果
  flutter_animate: ^4.5.2             # 组件链式动画快捷封装
  rxdart: ^0.28.0                     # Dart响应式流扩展

  # Git私有仓库自定义库
  flv_lzc:
    git: https://github.com/liuchuancong/flv_lzc.git # FLV视频流解析
  dart_quickjs:
    git: https://github.com/liuchuancong/dart_quickjs.git # QuickJS JS脚本引擎


dev_dependencies:
  flutter_test:
    sdk: flutter # Flutter单元测试框架
  flutter_lints: ^6.0.0 # Dart代码静态规范检查

  # 代码生成核心
  build_runner: ^2.15.0 # Dart代码生成执行器

  # 数据库生成
  drift_dev: ^2.33.0 # Drift SQL数据库代码生成

  # Hive数据库模型生成
  hive_ce_generator: ^1.11.2

  # 冻结数据类生成
  freezed: ^3.2.5 # freezed模型生成工具

  # JSON序列化生成
  json_serializable: ^6.14.0

  # 路由代码生成
  go_router_builder: ^4.3.0

  # Riverpod状态代码生成
  riverpod_generator: ^4.0.4

# 应用图标生成配置
flutter_icons:
  android: "ic_launcher"
  ios: true
  remove_alpha_ios: true
  image_path: assets/icons/icon.png
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: assets/icons/icon_foreground.png
  min_sdk_android: 21
  windows:
    generate: true
    image_path: assets/icons/icon.png
    icon_size: 48
  macos:
    generate: true
    image_path: assets/icons/icon.png

# Flutter工程基础配置
flutter:
  uses-material-design: true
  # 静态资源目录
  assets:
    - assets/
    - assets/images/
    - assets/images/video/
    - assets/icons/
    - assets/webdav/
    - assets/keystore/
    - assets/version.json
    - assets/releases.json
    - assets/emo/images/huya/
    - assets/emo/images/douyu/
    - assets/emo/images/douyin/
    - assets/emo/images/bilibili/
    - assets/emo/json/
    - assets/fonts/fonts-manifest.json
  # 自定义字体
  fonts:
    - family: CustomIcons
      fonts:
        - asset: assets/icons/CustomIcons.ttf
    - family: PingFang
      fonts:
        - asset: assets/MiSans-Regular.ttf